<div class="register-container">
  <h1>Register</h1>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form" novalidate>
    <div class="form-group">
      <label for="username">Username:</label>
      <input type="text" id="username" formControlName="username" class="form-control">
      <div *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" class="error">
        Username must be at least 5 characters.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" formControlName="email" class="form-control">
      <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error">
        Please enter a valid email.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" formControlName="password" class="form-control">
      <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error">
        Password must be at least 5 characters.
      </div>
    </div>

    <div class="form-group">
      <label for="rePassword">Repeat Password:</label>
      <input type="password" id="rePassword" formControlName="rePassword" class="form-control">
      <div *ngIf="registerForm.hasError('mismatch') && registerForm.get('rePassword')?.touched" class="error">
        Passwords do not match.
      </div>
    </div>

    <div class="form-group">
      <label for="tel">Phone (optional):</label>
      <input type="tel" id="tel" formControlName="tel" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Registering...' : 'Register' }}
    </button>

    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
  </form>
</div>

<div class="register-toast" *ngIf="showSuccessToast">
  Регистрацията е успешна
</div>
